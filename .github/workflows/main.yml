name: Seu Workflow Legal

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest   # ou ubuntu-24.04 / ubuntu-22.04 se quiser fixar

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar make (e build tools se precisar)
        run: |
          sudo apt-get update
          sudo apt-get install -y make build-essential

      - name: Rodar make clean
        run: make clean

      # ... seus outros passos (make build, testes, etc.)
